<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
:root{color-scheme:light;--blue:#0066cc;--bg:#f4f5f7;--card:#fff;--text:#1a1a2e;--muted:#6b7280;--border:#e5e7eb;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);padding:16px 20px;font-size:14px;}
h1{font-size:18px;font-weight:700;margin-bottom:2px;}
.subtitle{font-size:12px;color:var(--muted);margin-bottom:12px;}
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:16px;}
.tab{padding:8px 18px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);}
.summary{background:var(--card);border-radius:10px;padding:14px 20px;margin-bottom:16px;display:flex;gap:28px;flex-wrap:wrap;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.s-item{min-width:100px;}
.s-label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:2px;}
.s-val{font-size:22px;font-weight:700;}
.s-sub{font-size:11px;color:var(--muted);}
.tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:10px;}
.tile{background:var(--card);border-radius:10px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.tile-name{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;}
.tile-mtd{font-size:20px;font-weight:700;color:var(--text);}
.tile-proj{font-size:11px;color:var(--muted);margin-top:3px;}
.tile-proj b{color:var(--blue);}
.tile-daily{font-size:11px;color:var(--muted);margin-top:1px;}
.tile-bar-bg{background:#eef0f5;border-radius:3px;height:3px;margin-top:6px;overflow:hidden;}
.tile-bar-fill{height:3px;border-radius:3px;}
.tile-budget{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.4;}
.tile-budget b{font-weight:700;color:var(--text);}
.section-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.section-label:first-child{margin-top:0;}
.status{font-size:11px;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.dot{width:7px;height:7px;border-radius:50%;background:#10b981;flex-shrink:0;}
.dot.loading{background:#f59e0b;animation:pulse 1s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
</style>
</head>

const TOTAL_BUDGET=4155360;

const AGENT_KEYS=new Set(['AgentHR','AgentIT','AgentLegal','AgentMarketing','AgentWorkBuilder','AgentWork','AgentComp','AgentFinance','AgentConstruction','AgentReal','AgentNoteTaker']);

function fmt(n){return'$'+Math.round(n).toLocaleString();}
function bucket(ds){const w=new Date(ds+'T12:00:00Z').getUTCDay();return w===0?'sun':w===6?'sat':w===5?'fri':'wd';}

function computeRR(daySpend){
  const today=new Date().toISOString().slice(0,10);
  const todayN=parseInt(today.slice(8));
  const mtd=Object.values(daySpend).reduce((a,b)=>a+b,0);
  const reps={};
  for(let off=1;off<=21;off++){
    const d=new Date(today+'T12:00:00Z'); d.setUTCDate(d.getUTCDate()-off);
    const ds=d.toISOString().slice(0,10);
    if(ds<MONTH+'-01') break;
    const b=bucket(ds);
    if(!(b in reps)&&ds in daySpend) reps[b]=daySpend[ds];
    if(Object.keys(reps).length===4) break;
  }
  ['wd','fri','sat','sun'].forEach(b=>{if(!(b in reps))reps[b]=0;});
  const maxDay=Math.min(DAYS,31);
  let rem=0;
  for(let d=todayN+1;d<=maxDay;d++){
    const ds=MONTH+'-'+String(d).padStart(2,'0');
    rem+=reps[bucket(ds)];
  }
  const recent=Object.entries(daySpend).filter(([k])=>k<today).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,7).map(([,v])=>v);
  const daily=recent.length?recent.reduce((a,b)=>a+b,0)/recent.length:0;
  return{mtd,projected:mtd+rem,daily};
}

function aggByKey(rows,key){
  const r={};
  for(const row of rows){
    const k=row[key];const ds=row.d;
    if(!r[k])r[k]={};
    r[k][ds]=(r[k][ds]||0)+row.s;
  }
  return r;
}

function makeTile(i,pct,budget){
  let budgetBlock='';
  let barPct=pct;
  if(budget){
    const budgetPct=Math.round(i.mtd/budget*100);
    barPct=Math.min(100,budgetPct);
    budgetBlock=`<div class="tile-budget">Budget: <b>${fmt(budget)}</b></div>`;
  }
  return`<div class="tile">
    <div class="tile-name">${i.label}</div>
    <div class="tile-mtd">${fmt(i.mtd)}</div>
    <div class="tile-proj">Month's RR: <b>${fmt(i.projected)}</b></div>
    <div class="tile-daily">~${fmt(i.daily)}/day</div>
    ${budgetBlock}
    <div class="tile-bar-bg"><div class="tile-bar-fill" style="width:${barPct}%;background:var(--blue)"></div></div>
  </div>`;
}

function renderView(panelId,byKey,labels,splitAgents,budgetMap){
  const panel=document.getElementById(panelId);
  const items=[];
  for(const[k,ds] of Object.entries(byKey)){
    const{mtd,projected,daily}=computeRR(ds);
    if(mtd<5)continue;
    items.push({k,label:labels[k]||k,mtd,projected,daily,hide:k==='Other'});
  }
  items.sort((a,b)=>b.mtd-a.mtd);
  const totMTD=items.reduce((s,i)=>s+i.mtd,0);
  const totProj=items.reduce((s,i)=>s+i.projected,0);
  const today=new Date().toISOString().slice(0,10);
  const todayN=parseInt(today.slice(8));
  const elapsed=Math.round(todayN/DAYS*100);
  const pct=Math.min(100,elapsed);
  const budgetSummary=splitAgents?`<div class="s-item"><div class="s-label">Total SEM Budget</div><div class="s-val">${fmt(TOTAL_BUDGET)}</div><div class="s-sub">Proj: ${Math.round(totProj/TOTAL_BUDGET*100)}% of budget</div></div>`:'';
  let html=splitAgents?`<div class="section-label" style="margin-top:0">📊 Total SEM</div><div class="summary">
    <div class="s-item"><div class="s-label">MTD Spend</div><div class="s-val">${fmt(totMTD)}</div><div class="s-sub">${MONTH.slice(5).replace('-0','-').replace('-','/')} 1–${todayN}</div></div>
    <div class="s-item"><div class="s-label">Month's RR</div><div class="s-val">${fmt(totProj)}</div><div class="s-sub">Day-of-week projection</div></div>
    ${budgetSummary}
    <div class="s-item"><div class="s-label">Month Progress</div><div class="s-val">${todayN}/${DAYS}</div><div class="s-sub">${elapsed}% elapsed</div></div>
  </div>`:'';;
  if(splitAgents){
    const agents=items.filter(i=>AGENT_KEYS.has(i.k)&&!i.hide);
    const rest=items.filter(i=>!AGENT_KEYS.has(i.k)&&!i.hide);
    if(agents.length){
      html+=`<div class="section-label">🤖 Agents</div><div class="tiles">`;
      agents.forEach(i=>html+=makeTile(i,pct,budgetMap?budgetMap[i.k]:null));
      html+='</div>';
    }
    if(rest.length){
      html+=`<div class="section-label">📂 Clusters</div><div class="tiles">`;
      rest.forEach(i=>html+=makeTile(i,pct,budgetMap?budgetMap[i.k]:null));
      html+='</div>';
    }
  } else {
    html+=`<div class="tiles">`;
    items.filter(i=>!i.hide).forEach(i=>html+=makeTile(i,pct,budgetMap?budgetMap[i.k]:null));
    html+='</div>';
  }
  panel.innerHTML=html;
}

}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

async function kremerQuery(q){
  try{
    const r1=await window.cowork.callMcpTool('mcp__Kremer__data-expert-agent',{question:q,async:true});
    const jd=r1.structuredContent??JSON.parse(r1.content[0].text);
    const jobId=jd.jobId;
    for(let i=0;i<25;i++){
      await sleep(6000);
      const r2=await window.cowork.callMcpTool('mcp__Kremer__check-query-status',{jobId});
      const sd=r2.structuredContent??JSON.parse(r2.content[0].text);
      if(sd.status==='done'){
        const m=sd.answer.match(/START_JSON[\s\n]*([\s\S]*?)[\s\n]*END_JSON/);
        if(m)try{return JSON.parse(m[1]);}catch(e){console.error('JSON parse',e);}
        return [];
      }
    }
  }catch(e){console.error('Kremer',e);}
  return [];
}

async function main(){
  renderView('cluster-panel',aggByKey(HIST_C,'c'),CD,true,BUDGET_C);
  renderView('geo-panel',aggByKey(HIST_G,'g'),GD,false,BUDGET_G);

  const today=new Date().toISOString().slice(0,10);
  const monthStart=MONTH+'-01';

  // If today is still within the static data range, we're done
  const lastStaticDate=HIST_C.length?HIST_C.map(r=>r.d).sort().pop():'';
  if(today<=lastStaticDate||today>MONTH+'-31'){
    document.getElementById('dot').classList.remove('loading');
    document.getElementById('status-text').textContent=
      today<=lastStaticDate?`Showing ${lastStaticDate} (complete)`:`${MONTH} final spend`;
    return;
  }

  // Fetch live data from day after last static date to today
  const FROM=new Date(lastStaticDate+'T12:00:00Z');
  FROM.setUTCDate(FROM.getUTCDate()+1);
  const fromStr=FROM.toISOString().slice(0,10);

  const cQ=`Run this exact SQL and return ALL results as a JSON array between START_JSON and END_JSON markers (no extra text):
SELECT TO_CHAR(DATE(CREATED_AT),'YYYY-MM-DD') as d,
${CASE_CLUSTER} as c,
ROUND(SUM(COST),2) as s
FROM BIGBRAIN.L3.FACT_CAMPAIGN_MONITORING_DWH
WHERE GROUPED_CHANNEL='SEM' AND BUSINESS_GOAL='performance_marketing' AND PRODUCT_DTR='work_management'
AND DATE(CREATED_AT) BETWEEN '${fromStr}' AND CURRENT_DATE AND COST>0
GROUP BY 1,2 ORDER BY 1,2`;

  const gQ=`Run this exact SQL and return ALL results as a JSON array between START_JSON and END_JSON markers (no extra text):
SELECT TO_CHAR(DATE(CREATED_AT),'YYYY-MM-DD') as d, SPLIT_PART(LOWER(CAMPAIGN),'-',1) as g, ROUND(SUM(COST),2) as s
FROM BIGBRAIN.L3.FACT_CAMPAIGN_MONITORING_DWH
WHERE GROUPED_CHANNEL='SEM' AND BUSINESS_GOAL='performance_marketing' AND PRODUCT_DTR='work_management'
AND DATE(CREATED_AT) BETWEEN '${fromStr}' AND CURRENT_DATE AND COST>0
GROUP BY 1,2 ORDER BY 1,2`;

  const [liveC,liveG]=await Promise.all([kremerQuery(cQ),kremerQuery(gQ)]);

  if(liveC.length||liveG.length){
    renderView('cluster-panel',aggByKey([...HIST_C,...liveC],'c'),CD,true,BUDGET_C);
    renderView('geo-panel',aggByKey([...HIST_G,...liveG],'g'),GD,false,BUDGET_G);
  }

  const todayN=parseInt(today.slice(8));
  document.getElementById('dot').classList.remove('loading');
  document.getElementById('status-text').textContent=
    `Live · ${MONTH.slice(5).replace('-0','').replace('-','/')} 1–${todayN} actual + projection · ${new Date().toLocaleTimeString()}`;
}

main().catch(e=>{
  console.error(e);
  document.getElementById('dot').style.background='#ef4444';
  document.getElementById('dot').classList.remove('loading');
  document.getElementById('status-text').textContent='Error loading live data · showing static data only';
});
</script>
